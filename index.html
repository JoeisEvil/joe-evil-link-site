<style>
@font-face {
  font-family: 'MGS';
  src: url('https://fonts.cdnfonts.com/css/metal-gear-solid') format('woff2');
}

@import url('https://fonts.cdnfonts.com/css/metal-gear-solid');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cyan: #00e5ff;
  --magenta: #ff00c8;
  --purple: #a855f7;
  --bg: #0a0a0f;
  --text: #e0ddd5;
  --btn-bg: rgba(255,255,255,0.06);
  --btn-border: rgba(255,255,255,0.12);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Metal Gear Solid', 'Impact', 'Arial Narrow', sans-serif;
  overflow-x: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 1px,
    rgba(0, 0, 0, 0.15) 1px,
    rgba(0, 0, 0, 0.15) 2px
  );
  pointer-events: none;
  z-index: 100;
}

/* CRT vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 101;
}

/* Noise overlay */
.noise {
  position: fixed;
  inset: 0;
  z-index: 99;
  pointer-events: none;
  opacity: 0.04;
  animation: noise 0.2s steps(4) infinite;
}

@keyframes noise {
  0%, 100% { background-position: 0 0; }
  25% { background-position: -20% 40%; }
  50% { background-position: 60% -30%; }
  75% { background-position: -40% 70%; }
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  padding: 2rem 1.5rem;
  max-width: 420px;
  width: 100%;
  position: relative;
  z-index: 10;
}

.artist-name {
  font-size: 2.4rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text);
  text-shadow:
    2px 0 var(--cyan),
    -2px 0 var(--magenta),
    0 0 20px rgba(0, 229, 255, 0.3);
  animation: glitchIdle 4s infinite;
}

@keyframes glitchIdle {
  0%, 92%, 100% { text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta), 0 0 20px rgba(0,229,255,0.3); transform: none; }
  93% { text-shadow: -3px 0 var(--cyan), 3px 0 var(--magenta), 0 0 20px rgba(0,229,255,0.3); transform: translateX(-2px); }
  94% { text-shadow: 4px 0 var(--cyan), -1px 0 var(--magenta), 0 0 20px rgba(0,229,255,0.3); transform: translateX(2px); }
  95% { text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta), 0 0 20px rgba(0,229,255,0.3); transform: none; }
}

.album-art {
  width: 280px;
  height: 280px;
  border-radius: 4px;
  box-shadow:
    0 0 30px rgba(0, 229, 255, 0.15),
    0 0 60px rgba(168, 85, 247, 0.1),
    0 4px 20px rgba(0,0,0,0.6);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  image-rendering: auto;
}

.album-art:hover {
  transform: scale(1.02);
  box-shadow:
    0 0 40px rgba(0, 229, 255, 0.25),
    0 0 80px rgba(168, 85, 247, 0.15),
    0 4px 30px rgba(0,0,0,0.7);
}

.album-title {
  font-size: 0.85rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(224, 221, 213, 0.6);
  text-align: center;
  line-height: 1.5;
  max-width: 320px;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  width: 100%;
  margin-top: 0.5rem;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  padding: 0.85rem 1.5rem;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: 4px;
  color: var(--text);
  text-decoration: none;
  font-family: 'Metal Gear Solid', 'Impact', 'Arial Narrow', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.link-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  transform: translateX(-100%);
  transition: transform 0.4s ease;
}

.link-btn:hover::before {
  transform: translateX(100%);
}

.link-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--cyan);
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.15), inset 0 0 15px rgba(0, 229, 255, 0.05);
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
  animation: btnGlitch 0.3s steps(2);
}

@keyframes btnGlitch {
  0% { transform: none; }
  20% { transform: translateX(-2px) skewX(-1deg); }
  40% { transform: translateX(2px) skewX(1deg); }
  60% { transform: translateX(-1px); }
  80% { transform: translateX(1px); }
  100% { transform: none; }
}

.link-btn svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  fill: currentColor;
}

/* Spotify green accent on hover */
.link-btn.spotify:hover { border-color: #7b2fbe; box-shadow: 0 0 15px rgba(123,47,190,0.2), inset 0 0 15px rgba(123,47,190,0.05); text-shadow: 0 0 8px rgba(123,47,190,0.4); }
.link-btn.apple:hover { border-color: #c840e9; box-shadow: 0 0 15px rgba(200,64,233,0.2), inset 0 0 15px rgba(200,64,233,0.05); text-shadow: 0 0 8px rgba(200,64,233,0.4); }
.link-btn.tidal:hover { border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.2), inset 0 0 15px rgba(0,255,255,0.05); text-shadow: 0 0 8px rgba(0,255,255,0.4); }
.link-btn.instagram:hover { border-color: #1db954; box-shadow: 0 0 15px rgba(29,185,84,0.2), inset 0 0 15px rgba(29,185,84,0.05); text-shadow: 0 0 8px rgba(29,185,84,0.4); }

/* Flickering screen effect */
@keyframes flicker {
  0%, 97%, 100% { opacity: 1; }
  97.5% { opacity: 0.85; }
  98% { opacity: 1; }
  98.5% { opacity: 0.9; }
}

.container { animation: flicker 8s infinite; }

@media (max-width: 480px) {
  .artist-name { font-size: 1.8rem; }
  .album-art { width: 240px; height: 240px; }
  .container { padding: 1.5rem 1rem; }
}

<script>
// Generate noise canvas for static effect
const canvas = document.createElement('canvas');
canvas.width = 256;
canvas.height = 256;
const ctx = canvas.getContext('2d');

function generateNoise() {
  const imageData = ctx.createImageData(256, 256);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 255;
    data[i] = v;
    data[i+1] = v;
    data[i+2] = v;
    data[i+3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
  document.getElementById('noise').style.backgroundImage = `url(${canvas.toDataURL()})`;
}

generateNoise();
setInterval(generateNoise, 100);
</script>
